[pytest]
# Only collect tests from the tests/ directory.
# The root __init__.py imports hermes-agent internals (agent.memory_provider)
# which aren't available in the standalone repo — pytest treats it as a package
# and tries to import it during setup, causing all tests to ERROR.
# This configuration prevents that by restricting collection scope.
testpaths = tests
python_files = test_*.py _test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
