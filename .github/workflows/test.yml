name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify dependencies
        run: |
          python -c "import sqlite_vec; print('sqlite-vec: OK')"
          python -c "import onnxruntime; print('onnxruntime: OK')"
          python -c "import tokenizers; print('tokenizers: OK')"
          python -c "import numpy; print('numpy: OK')"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run standalone sanitiser tests
        run: |
          python tests/_test_sanitiser.py
